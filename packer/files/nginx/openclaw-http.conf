# HTTP-only Nginx config for Let's Encrypt IP certificate HTTP-01 validation
# Used before SSL certificates exist; replaced by openclaw-ssl.conf after issuance

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 200 'OpenClaw Enterprise - HTTPS provisioning in progress';
        add_header Content-Type text/plain;
    }
}
